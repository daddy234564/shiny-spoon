<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fern</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    height: 100%;
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

#stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

/* HOME */
#home {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    transition: opacity 0.35s ease;
}

#home.hidden { opacity: 0; pointer-events: none; }

.fern-logo {
    font-family: 'Pinyon Script', cursive;
    font-size: 90px;
    color: #e8f5e9;
    line-height: 1;
    margin-bottom: 26px;
    text-shadow: 0 0 40px #4ade8020;
    user-select: none;
}

.search-wrap {
    width: 380px;
    margin-bottom: 10px;
}

.search-bar {
    width: 100%;
    background: #111;
    border: 1.5px solid #2a5a35;
    border-radius: 8px;
    padding: 11px 16px;
    font-size: 14px;
    color: #d4d4d4;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.search-bar::placeholder { color: #3a6b45; }

.search-bar:focus {
    border-color: #4ade80;
    box-shadow: 0 0 0 3px #4ade8012;
}

.search-hint {
    font-size: 11.5px;
    color: #2d5a3a;
    text-align: center;
    margin-bottom: 26px;
    letter-spacing: 0.1px;
}

.search-hint kbd {
    background: #1a2e1d;
    border: 1px solid #2d5a3a;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: monospace;
    color: #3a7a47;
}

.apps-section { width: 380px; }

.apps-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 2px;
}

.apps-title { font-size: 13px; color: #5a8a65; font-weight: 400; }
.apps-edit  { font-size: 13px; color: #3a6b45; cursor: pointer; transition: color 0.15s; }
.apps-edit:hover { color: #4ade80; }

.apps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.app-tile {
    background: #111;
    border: 1px solid #1a2e1d;
    border-radius: 10px;
    padding: 14px 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
}

.app-tile:hover { background: #161f17; border-color: #2d5a3a; transform: translateY(-1px); }
.app-tile:active { transform: scale(0.97); }

.app-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.app-icon img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }

.app-name {
    font-size: 11px;
    color: #7a9a80;
    text-align: center;
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* IFRAME */
#frame {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    border: none;
    z-index: 3;
    display: none;
    background: #fff;
}

/* TOOLBAR */
#toolbar {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 4px;
    background: #0e0e0eee;
    border: 1px solid #1e3322;
    border-radius: 100px;
    padding: 5px 8px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px #00000080;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
}

#toolbar.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

.tb-btn {
    width: 32px; height: 32px;
    background: transparent;
    border: none;
    border-radius: 50%;
    color: #4a7a55;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
}

.tb-btn:hover { background: #1a3a20; color: #4ade80; }
.tb-btn:active { transform: scale(0.9); }

.tb-sep { width: 1px; height: 18px; background: #1e3322; flex-shrink: 0; margin: 0 2px; }

#tb-url {
    background: #161f17;
    border: 1px solid #1e3322;
    border-radius: 100px;
    padding: 0 14px;
    height: 28px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    color: #7a9a80;
    outline: none;
    width: 220px;
    transition: width 0.25s, border-color 0.2s, color 0.2s;
}

#tb-url:focus { width: 300px; border-color: #2d5a3a; color: #d4d4d4; }
#tb-url::placeholder { color: #2d5a3a; }

.proxy-wrap { position: relative; }

.proxy-menu {
    position: absolute;
    bottom: calc(100% + 10px);
    right: 0;
    background: #0e0e0ef5;
    border: 1px solid #1e3322;
    border-radius: 12px;
    padding: 5px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 148px;
    backdrop-filter: blur(20px);
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95) translateY(4px);
    transition: all 0.2s;
    z-index: 30;
}

.proxy-menu.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }

.pm-item {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: #5a8a65;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s, color 0.1s;
}

.pm-item:hover { background: #1a3a20; color: #d4d4d4; }
.pm-item.active { color: #4ade80; }

.pm-dot { width: 6px; height: 6px; border-radius: 50%; background: #2d5a3a; flex-shrink: 0; }
.pm-item.active .pm-dot { background: #4ade80; box-shadow: 0 0 5px #4ade80; }

/* Load bar */
#loadbar {
    position: fixed;
    top: 0; left: 0;
    height: 2px; width: 0%;
    background: linear-gradient(90deg, #4ade80, #86efac);
    z-index: 50;
    opacity: 0;
    transition: width 0.4s ease, opacity 0.3s;
    box-shadow: 0 0 8px #4ade80;
}

/* Toast */
#toast {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: #111;
    border: 1px solid #1e3322;
    border-radius: 100px;
    padding: 7px 16px;
    font-size: 12px;
    color: #7a9a80;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 60;
    white-space: nowrap;
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="loadbar"></div>

<!-- HOME -->
<div id="home">
    <div class="fern-logo">fern</div>

    <div class="search-wrap">
        <input class="search-bar" id="homeSearch" type="text"
               placeholder="search..." autocomplete="off" spellcheck="false">
    </div>
    <div class="search-hint">Press <kbd>ctrl+y</kbd> to open command palette</div>

    <div class="apps-section">
        <div class="apps-header">
            <span class="apps-title">Quick apps</span>
            <span class="apps-edit">Edit</span>
        </div>
        <div class="apps-grid" id="appsGrid"></div>
    </div>
</div>

<!-- FRAME -->
<iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-top-navigation"></iframe>

<!-- TOOLBAR -->
<div id="toolbar">
    <button class="tb-btn" id="homeBtn" title="Home">⌂</button>
    <button class="tb-btn" id="backBtn" title="Back">&#8592;</button>
    <button class="tb-btn" id="fwdBtn"  title="Forward">&#8594;</button>
    <button class="tb-btn" id="reloadBtn" title="Reload">&#8635;</button>
    <div class="tb-sep"></div>
    <input id="tb-url" type="text" placeholder="search or enter url…" spellcheck="false" autocomplete="off">
    <div class="tb-sep"></div>
    <div class="proxy-wrap">
        <button class="tb-btn" id="proxyBtn" title="Switch proxy">&#9889;</button>
        <div class="proxy-menu" id="proxyMenu"></div>
    </div>
    <button class="tb-btn" id="panicBtn" title="Panic (Alt+P)">&#128737;</button>
</div>

<div id="toast"></div>

<script>
/* ── STARFIELD ── */
(function () {
    const cv  = document.getElementById('stars-canvas');
    const ctx = cv.getContext('2d');
    let W, H, stars = [], consts = [], shooters = [];

    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }

    function rnd(a, b) { return a + Math.random() * (b - a); }

    function initStars() {
        stars = [];
        for (let i = 0; i < (W * H) / 4200; i++) {
            stars.push({
                x: Math.random() * W, y: Math.random() * H,
                r: rnd(0.4, 1.6), a: rnd(0.2, 0.9),
                spd: rnd(0.003, 0.012), dir: Math.random() > .5 ? 1 : -1,
                col: Math.random() > .85 ? '#a7f5c0' : '#fff'
            });
        }
    }

    function initConsts() {
        consts = [];
        for (let c = 0; c < 5; c++) {
            const cx = rnd(W * .05, W * .95), cy = rnd(H * .05, H * .75);
            const pts = Array.from({ length: Math.floor(rnd(4, 8)) }, () => ({
                x: cx + rnd(-160, 160), y: cy + rnd(-120, 120)
            }));
            const edges = pts.slice(1).map((_, i) => [i, i + 1]);
            for (let e = 0; e < 2; e++) {
                const a = Math.floor(Math.random() * pts.length);
                const b = Math.floor(Math.random() * pts.length);
                if (a !== b) edges.push([a, b]);
            }
            consts.push({ pts, edges });
        }
    }

    function spawnShooter() {
        shooters.push({
            x: rnd(W * .3, W), y: rnd(0, H * .4),
            vx: rnd(-5, -2), vy: rnd(1.5, 4),
            len: rnd(60, 130), life: 1
        });
    }

    let tick = 0;
    function loop() {
        ctx.clearRect(0, 0, W, H);

        // constellations
        for (const cn of consts) {
            ctx.strokeStyle = '#2a5a35'; ctx.lineWidth = 0.6; ctx.globalAlpha = 0.45;
            for (const [a, b] of cn.edges) {
                ctx.beginPath();
                ctx.moveTo(cn.pts[a].x, cn.pts[a].y);
                ctx.lineTo(cn.pts[b].x, cn.pts[b].y);
                ctx.stroke();
            }
            ctx.globalAlpha = 0.65;
            for (const p of cn.pts) {
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
                ctx.fillStyle = '#4ade80'; ctx.fill();
            }
        }

        // stars
        ctx.globalAlpha = 1;
        for (const s of stars) {
            s.a += s.spd * s.dir;
            if (s.a >= .95 || s.a <= .1) s.dir *= -1;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = s.col; ctx.globalAlpha = s.a; ctx.fill();
        }
        ctx.globalAlpha = 1;

        // shooters
        shooters = shooters.filter(s => s.life > 0);
        for (const s of shooters) {
            const g = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * s.len / 5, s.y - s.vy * s.len / 5);
            g.addColorStop(0, `rgba(180,255,200,${s.life * .9})`);
            g.addColorStop(1, 'rgba(180,255,200,0)');
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.vx * s.len / 5, s.y - s.vy * s.len / 5);
            ctx.strokeStyle = g; ctx.lineWidth = 1.5; ctx.stroke();
            s.x += s.vx; s.y += s.vy; s.life -= 0.018;
        }

        tick++;
        if (tick % 200 === 0 && Math.random() > .3) spawnShooter();
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); initStars(); initConsts(); });
    resize(); initStars(); initConsts(); loop();
})();

/* ── PROXIES ── */
// Real working public web proxy/unblocker services (open in iframe)
const PROXIES = [
    { name: 'CroxyProxy',   buildUrl: u => `https://www.croxyproxy.com/requests/get?url=${encodeURIComponent(u)}` },
    { name: 'ProxySite',    buildUrl: u => `https://www.proxysite.com/index.php?q=${encodeURIComponent(u)}&hl=on` },
    { name: 'Proxyium',     buildUrl: u => `https://proxyium.com/?url=${encodeURIComponent(u)}` },
    { name: 'Blockaway',    buildUrl: u => `https://www.blockaway.net/index.php?q=${encodeURIComponent(u)}&hl=on` },
    { name: 'DuckDuckGo',   buildUrl: u => `https://duckduckgo.com/?q=${encodeURIComponent(u)}&ia=web` },
];

/* ── APPS ── */
const APPS = [
    { name: 'YouTube',   url: 'youtube.com',        fav: 'https://www.youtube.com/favicon.ico' },
    { name: 'GitHub',    url: 'github.com',          fav: 'https://github.com/favicon.ico' },
    { name: 'Discord',   url: 'discord.com',         fav: 'https://discord.com/favicon.ico' },
    { name: 'TikTok',    url: 'tiktok.com',          fav: 'https://www.tiktok.com/favicon.ico' },
    { name: 'Google',    url: 'google.com',           fav: 'https://www.google.com/favicon.ico' },
    { name: 'Twitter/X', url: 'x.com',               fav: 'https://x.com/favicon.ico' },
    { name: 'Roblox',    url: 'roblox.com',           fav: 'https://www.roblox.com/favicon.ico' },
    { name: 'Spotify',   url: 'open.spotify.com',    fav: 'https://open.spotify.com/favicon.ico' },
    { name: 'Movies',    url: 'soap2day.to',          fav: null, emoji: '🎬' },
    { name: 'Games',     url: 'coolmathgames.com',    fav: null, emoji: '🎮' },
    { name: 'AI',        url: 'chat.openai.com',      fav: null, emoji: '✦' },
];

const grid = document.getElementById('appsGrid');
APPS.forEach(app => {
    const t = document.createElement('div');
    t.className = 'app-tile';
    t.innerHTML = `
        <div class="app-icon">
          ${app.fav
            ? `<img src="${app.fav}" alt="" onerror="this.outerHTML='<span style=font-size:20px>🌐</span>'">`
            : `<span style="font-size:22px">${app.emoji}</span>`}
        </div>
        <div class="app-name">${app.name}</div>`;
    t.addEventListener('click', () => navigate(app.url));
    grid.appendChild(t);
});

/* ── PROXY MENU ── */
let proxyIdx = 0;
const proxyMenu = document.getElementById('proxyMenu');

function renderProxyMenu() {
    proxyMenu.innerHTML = '';
    PROXIES.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'pm-item' + (i === proxyIdx ? ' active' : '');
        el.innerHTML = `<div class="pm-dot"></div>${p.name}`;
        el.addEventListener('click', e => {
            e.stopPropagation();
            proxyIdx = i;
            renderProxyMenu();
            proxyMenu.classList.remove('open');
            toast(`Proxy: ${p.name}`);
            if (navHistory[histIdx]) navigate(navHistory[histIdx], false);
        });
        proxyMenu.appendChild(el);
    });
}
renderProxyMenu();

/* ── NAV STATE ── */
let navHistory = [], histIdx = -1, autoTry = 0, loadTimer = null, loadAnim = null;

const home       = document.getElementById('home');
const frame      = document.getElementById('frame');
const toolbar    = document.getElementById('toolbar');
const loadbar    = document.getElementById('loadbar');
const tbUrl      = document.getElementById('tb-url');
const homeSearch = document.getElementById('homeSearch');

function isUrl(s) {
    return /^https?:\/\//i.test(s) || (/\S+\.\S+/.test(s) && !s.includes(' '));
}

function normalise(raw) {
    raw = raw.trim();
    if (!raw) return '';
    if (!isUrl(raw)) return 'https://duckduckgo.com/?q=' + encodeURIComponent(raw) + '&ia=web';
    return /^https?:\/\//i.test(raw) ? raw : 'https://' + raw;
}

function startLoad() {
    loadbar.style.opacity = '1'; loadbar.style.width = '0%';
    clearInterval(loadAnim);
    let w = 0;
    loadAnim = setInterval(() => {
        w = Math.min(w + Math.random() * 7, 88);
        loadbar.style.width = w + '%';
    }, 180);
}

function finishLoad() {
    clearInterval(loadAnim);
    loadbar.style.width = '100%';
    setTimeout(() => { loadbar.style.opacity = '0'; loadbar.style.width = '0'; }, 400);
}

function toast(msg, ms = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function navigate(raw, resetTry = true) {
    const url = normalise(raw);
    if (!url) return;
    if (resetTry) autoTry = 0;

    home.classList.add('hidden');
    frame.style.display = 'block';
    toolbar.classList.add('visible');
    tbUrl.value = url;

    startLoad();
    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => tryNext(url), 10000);

    frame.src = PROXIES[proxyIdx].buildUrl(url);

    if (histIdx === -1 || navHistory[histIdx] !== url) {
        navHistory = navHistory.slice(0, histIdx + 1);
        navHistory.push(url);
        histIdx = navHistory.length - 1;
    }
}

function tryNext(url) {
    autoTry++;
    if (autoTry >= PROXIES.length) { finishLoad(); toast('⚠ All proxies failed.'); return; }
    proxyIdx = (proxyIdx + 1) % PROXIES.length;
    renderProxyMenu();
    toast(`↻ Trying ${PROXIES[proxyIdx].name}…`);
    navigate(url, false);
}

function goHome() {
    frame.style.display = 'none';
    home.classList.remove('hidden');
    toolbar.classList.remove('visible');
    homeSearch.value = '';
    setTimeout(() => homeSearch.focus(), 50);
}

frame.addEventListener('load', () => { clearTimeout(loadTimer); finishLoad(); autoTry = 0; });
frame.addEventListener('error', () => { clearTimeout(loadTimer); tryNext(navHistory[histIdx] || ''); });

document.getElementById('homeBtn').addEventListener('click', goHome);
document.getElementById('backBtn').addEventListener('click', () => { if (histIdx > 0) { histIdx--; navigate(navHistory[histIdx]); } });
document.getElementById('fwdBtn').addEventListener('click',  () => { if (histIdx < navHistory.length - 1) { histIdx++; navigate(navHistory[histIdx]); } });
document.getElementById('reloadBtn').addEventListener('click', () => { if (navHistory[histIdx]) navigate(navHistory[histIdx]); });
document.getElementById('panicBtn').addEventListener('click', () => {
    goHome(); navigate('classroom.google.com');
});

document.getElementById('proxyBtn').addEventListener('click', e => {
    e.stopPropagation(); proxyMenu.classList.toggle('open');
});
document.addEventListener('click', () => proxyMenu.classList.remove('open'));

tbUrl.addEventListener('keydown',      e => { if (e.key === 'Enter') navigate(tbUrl.value); });
homeSearch.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(homeSearch.value); });

document.addEventListener('keydown', e => {
    if (e.altKey && e.key === 'p') { e.preventDefault(); navigate('classroom.google.com'); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); goHome(); }
    if (e.key === 'Escape' && frame.style.display !== 'none') goHome();
});

// Auto-show toolbar when mouse near bottom while browsing
document.addEventListener('mousemove', e => {
    if (frame.style.display !== 'none') {
        if (e.clientY > innerHeight - 80) toolbar.classList.add('visible');
    }
});

homeSearch.focus();
</script>
</body>
</html>
